<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Origin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- 1. The 3D/2D Canvas Background -->
    <div id="canvas-container"></div>

    <!-- 2. The Minimalist Top-Left HUD -->
    <div id="hud-age-container" class="glass-panel">
        <div class="hud-label">Universe Age</div>
        <div id="hud-age" class="hud-value data-font">0 Years</div>
    </div>

    <!-- 3. Bottom Navigation (Sleek, strictly icons) -->
    <div id="bottom-nav">
        <div class="nav-btn active" id="btn-explore">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><circle cx="12" cy="12" r="3"/></svg>
            Explore
        </div>
        <div class="nav-btn" id="btn-events">
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
            Events
        </div>
        <div class="nav-btn" id="btn-ai">
            <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
            Origin
        </div>
        <div class="nav-btn" id="btn-timeline">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            Timeline
        </div>
        <div class="nav-btn" id="btn-catalog">
            <svg viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"/></svg>
            Catalog
        </div>
    </div>

    <!-- 4. Tab Views -->
    <!-- Events Tab -->
    <div id="view-events" class="view-panel">
        <div id="events-container"></div>
    </div>

    <!-- Origin AI Tab -->
    <div id="view-ai" class="view-panel">
        <div class="glass-panel" style="padding: 20px; margin-bottom: 20px;">
            <div class="hud-label" style="color: #00e5ff;">Active Computational Goal</div>
            <div id="ai-goal-text" style="font-size: 16px; font-weight: bold; margin-bottom: 8px;">Awaiting telemtry...</div>
            <div id="ai-reasoning-text" style="font-size: 13px; color: #a0a0c0;">Initializing cognitive models...</div>
        </div>
        <div id="origin-actions-container"></div>
    </div>

    <!-- Timeline Tab -->
    <div id="view-timeline" class="view-panel">
        <div class="timeline-wrapper" id="timeline-container"></div>
    </div>

    <!-- Catalog Tab -->
    <div id="view-catalog" class="view-panel">
        <div class="catalog-grid">
            <div class="glass-panel cat-card">
                <div class="cat-label">Stars</div>
                <div id="cat-stars" class="cat-val data-font">0</div>
            </div>
            <div class="glass-panel cat-card">
                <div class="cat-label">Black Holes</div>
                <div id="cat-bh" class="cat-val data-font">0</div>
            </div>
            <div class="glass-panel cat-card">
                <div class="cat-label">Neutron Stars</div>
                <div id="cat-neutron" class="cat-val data-font">0</div>
            </div>
            <div class="glass-panel cat-card">
                <div class="cat-label">Planets</div>
                <div id="cat-planets" class="cat-val data-font">0</div>
            </div>
        </div>
    </div>

    <!-- 5. Object Inspector UI -->
    <!-- Quick Preview Bubble -->
    <div id="inspector-preview" class="glass-panel">
        <div>
            <div id="obj-name">Target Acquired</div>
            <div id="obj-sub">Scanning class...</div>
        </div>
        <button id="btn-expand-inspect" style="background:rgba(255,255,255,0.1); border:none; color:#fff; border-radius:8px; padding:8px 16px; font-weight:bold;">Inspect</button>
    </div>

    <!-- Full Screen Details -->
    <div id="modal-object-detail" class="view-panel">
        <div class="modal-header">
            <button class="btn-back" id="btn-close-inspect">←</button>
            <div>
                <div id="inspect-title" style="font-size: 20px; font-weight: bold;">Object</div>
                <div style="font-size: 12px; color: #8c8f9f;">Telemetry Data</div>
            </div>
        </div>
        <div class="glass-panel" style="padding: 24px;">
            <div class="hud-label" style="margin-bottom: 16px;">Overview Specifications</div>
            <div class="grid-specs" id="spec-name" class="data-font" style="color: #e0e0e0; font-size: 14px; line-height: 1.8;">
                <!-- JS injects the clean Designation, Class, Temp, and Mass here -->
            </div>
        </div>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
