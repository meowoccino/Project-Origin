<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuous AI Universe Engine</title>
    <link rel="stylesheet" href="ui/styles.css">
</head>
<body>
    <!-- Main 3D Canvas for Particle Renderer -->
    <canvas id="universe-canvas"></canvas>

    <!-- Overlay UI Header -->
    <div id="hud-overlay">
        <div id="cosmic-clock">Cosmic Age: <span id="age-display">t + 0.0 Myr</span></div>
        <div id="node-count">Active Particles: <span id="nodes-display">500,000</span></div>
    </div>

    <!-- AI Thought Feed Overlay -->
    <div id="ai-journal-panel">
        <h3>AI Observer Log</h3>
        <ul id="thought-list">
            <li>Awaiting continuous simulation pulse from Oracle Cloud...</li>
        </ul>
    </div>

    <!-- JavaScript Module Loading -->
    <script type="module">
        import { fetchCosmicState, fetchAIJournal, subscribeToCosmicUpdates } from './services/supabase.js';

        // Load initial state on page start
        async function initWebAssemblyViewer() {
            const state = await fetchCosmicState();
            if (state) {
                document.getElementById('age-display').innerText = `t + ${state.cosmic_age_myr.toFixed(1)} Myr`;
                document.getElementById('nodes-display').innerText = state.total_active_nodes.toLocaleString();
            }

            const journals = await fetchAIJournal(5);
            if (journals && journals.length > 0) {
                const list = document.getElementById('thought-list');
                list.innerHTML = '';
                journals.forEach(entry => {
                    const li = document.createElement('li');
                    li.innerText = `[t+${entry.cosmic_age_myr} Myr]: ${entry.thought_log}`;
                    list.appendChild(li);
                });
            }
        }

        // Listen for live updates pushed by Oracle/AI
        subscribeToCosmicUpdates(
            (updatedState) => {
                document.getElementById('age-display').innerText = `t + ${updatedState.cosmic_age_myr.toFixed(1)} Myr`;
            },
            (newThought) => {
                const list = document.getElementById('thought-list');
                const li = document.createElement('li');
                li.innerText = `[t+${newThought.cosmic_age_myr} Myr]: ${newThought.thought_log}`;
                list.insertBefore(li, list.firstChild);
            }
        );

        initWebAssemblyViewer();
    </script>
</body>
</html>
