<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Origin</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05060A;
            --surface: #0B0D14;
            --card: #0A0C14;
            --border: rgba(255, 255, 255, 0.08);
            --cyan: #00E5FF;
            --orange: #FF8C00;
            --purple: #A855F7;
            --dim: #64748B;
            --text: #F8FAFC;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; /* Prevent body scroll, let tabs scroll */
        }
        
        .mono { font-family: 'Space Mono', monospace; }

        /* --- 3D CANVAS BACKGROUND --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at center, #0B0D14 0%, #05060A 100%);
        }

        /* --- APP LAYOUT & TABS --- */
        #app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px; /* Space for bottom nav */
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- BOTTOM NAVIGATION --- */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(5, 6, 10, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--dim);
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-btn.active {
            color: var(--cyan);
            font-weight: bold;
        }

        /* --- ORIGIN UI REDESIGN (STYLE 2) --- */
        .observer-module { display: flex; flex-direction: column; align-items: center; margin: 10px 0 20px 0; }
        .eye-container { width: 50px; height: 50px; position: relative; display: flex; align-items: center; justify-content: center; }
        .eye-ring-outer { position: absolute; width: 100%; height: 100%; border: 1px dashed var(--dim); border-radius: 50%; animation: spin 10s linear infinite; }
        .eye-ring-inner { position: absolute; width: 65%; height: 65%; border: 2px solid transparent; border-top-color: var(--cyan); border-bottom-color: var(--cyan); border-radius: 50%; animation: spin 4s linear infinite reverse; }
        .eye-core { width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 12px var(--cyan); }
        .status-text { margin-top: 8px; font-size: 10px; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .camera-wall-info { background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0,229,255,0.15); border-radius: 6px; padding: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; font-size: 10px; }

        .log-2 { background: var(--card); border: 1px solid rgba(0,229,255,0.2); border-radius: 12px; padding: 16px; margin-bottom: 16px; position: relative; }
        .log-2.intervene { border-color: rgba(255, 140, 0, 0.4); }
        .log-2-title { font-size: 13px; font-weight: bold; color: #FFF; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .log-2-meta { font-size: 10px; color: var(--cyan); margin-bottom: 14px; }
        
        .logic-step { display: flex; gap: 10px; margin-bottom: 12px; }
        .logic-icon { font-size: 11px; color: var(--cyan); padding-top: 2px; }
        .logic-text { font-size: 12px; color: #A0AEC0; line-height: 1.5; }
        
        .logic-decision { background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0,229,255,0.15); padding: 10px; border-radius: 6px; margin-top: 12px; }
        .logic-decision .logic-text { color: #FFF; font-style: italic; }
        .intervene .logic-decision { background: rgba(255, 140, 0, 0.05); border-color: rgba(255, 140, 0, 0.15); }

        .bio-box { background: rgba(168, 85, 247, 0.1); border: 1px solid var(--purple); padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 11px; }
        .bio-title { color: var(--purple); font-weight: bold; text-transform: uppercase; margin-bottom: 4px; font-size: 9px; letter-spacing: 1px; }

        .btn-history { width: 100%; padding: 14px; background: rgba(255,255,255,0.03); border: 1px dashed var(--dim); color: #FFF; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; border-radius: 8px; font-weight: 700; margin-top: 10px; }
        
        /* Placeholder styling for other tabs */
        .placeholder-text { text-align: center; color: var(--dim); margin-top: 40px; font-size: 12px; }
    </style>
</head>
<body>

    <!-- BACKGROUND CANVAS -->
    <canvas id="bg-canvas"></canvas>

    <div id="app-container">
        
        <!-- TAB 1: EXPLORE -->
        <div id="tab-explore" class="tab-content">
            <div class="placeholder-text mono">EXPLORE UI GOES HERE</div>
        </div>

        <!-- TAB 2: ORIGIN LOGS (ACTIVE BY DEFAULT) -->
        <div id="tab-origin" class="tab-content active">
            <div class="observer-module">
                <div class="eye-container">
                    <div class="eye-ring-outer"></div>
                    <div class="eye-ring-inner"></div>
                    <div class="eye-core"></div>
                </div>
                <div class="status-text mono">Observer Engine Online</div>
            </div>

            <div class="camera-wall-info mono">
                <span>BOUNDS: <span id="wall-radius">0.42</span> Mly</span>
                <span style="color: var(--dim);">SCALE FACTOR a(t): <span id="scale-factor">0.028</span></span>
            </div>

            <div id="logs-container"></div>

            <button class="btn-history mono" id="btn-load-more" onclick="loadMoreLogs()">Query Archived Telemetry</button>
        </div>

        <!-- TAB 3: CATALOG -->
        <div id="tab-catalog" class="tab-content">
            <div class="placeholder-text mono">CATALOG UI GOES HERE</div>
        </div>

    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav id="bottom-nav">
        <button class="nav-btn" onclick="switchTab('explore', this)">
            <span style="font-size: 16px;">🔭</span>
            Explore
        </button>
        <button class="nav-btn active" onclick="switchTab('origin', this)">
            <span style="font-size: 16px;">👁</span>
            Origin
        </button>
        <button class="nav-btn" onclick="switchTab('catalog', this)">
            <span style="font-size: 16px;">📊</span>
            Catalog
        </button>
    </nav>

    <script>
        // ==========================================
        // 1. TAB NAVIGATION LOGIC
        // ==========================================
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`tab-${tabId}`).classList.add('active');
            btnElement.classList.add('active');
        }

        // ==========================================
        // 2. CANVAS BACKGROUND (BASIC STARFIELD REPLACEMENT)
        // ==========================================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Simple drifting stars to keep the background alive
        const stars = Array(100).fill().map(() => ({
            x: Math.random() * width, y: Math.random() * height,
            s: Math.random() * 1.5, a: Math.random()
        }));

        function drawCanvas() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#FFF';
            stars.forEach(star => {
                ctx.globalAlpha = star.a;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.s, 0, Math.PI * 2);
                ctx.fill();
                star.y -= 0.2;
                if (star.y < 0) star.y = height;
            });
            requestAnimationFrame(drawCanvas);
        }
        drawCanvas();

        // ==========================================
        // 3. SUPABASE ORIGIN LOGIC (STYLE 2)
        // ==========================================
        const SUPABASE_URL = "https://YOUR_SUPABASE_ID.supabase.co"; // Replace with your URL
        const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";               // Replace with your Key
        let oldestLoadedId = null;

        function getCategoryIcon(subject) {
            const s = subject.toLowerCase();
            if (s.includes("star") || s.includes("core")) return "[✦]";
            if (s.includes("black hole") || s.includes("void")) return "[◎]";
            if (s.includes("planet") || s.includes("accretion")) return "[🪐]";
            if (s.includes("nebula") || s.includes("gas")) return "[✧]";
            if (s.includes("biosphere") || s.includes("life") || s.includes("world")) return "[⚚]";
            return "[◈]";
        }

        function updateCameraWall(ageGyr) {
            const a_t = Math.max(0.0001, Math.pow(Math.sinh(1.5 * Math.sqrt(0.685) * (ageGyr / 14.0)), 2/3));
            document.getElementById("scale-factor").innerText = a_t.toFixed(4);
            document.getElementById("wall-radius").innerText = (a_t * 14.2).toFixed(2);
        }

        async function loadMoreLogs() {
            let url = `${SUPABASE_URL}/rest/v1/origin_logs?select=*&order=id.desc&limit=10`;
            if (oldestLoadedId) url += `&id=lt.${oldestLoadedId}`;

            try {
                const res = await fetch(url, { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } });
                const logs = await res.json();
                
                if (logs.length === 0) {
                    document.getElementById("btn-load-more").innerText = "End of Telemetry Archive";
                    return;
                }

                const container = document.getElementById("logs-container");
                if (!oldestLoadedId) container.innerHTML = ""; 

                logs.forEach(log => {
                    oldestLoadedId = log.id;
                    updateCameraWall(log.age_gyr);

                    const icon = getCategoryIcon(log.subject);
                    const isIntervene = log.mode === "INTERVENE";

                    let bioHtml = "";
                    if (log.biosphere_data) {
                        const b = log.biosphere_data;
                        bioHtml = `
                            <div class="bio-box mono">
                                <div class="bio-title">[⚚ Biosphere Analyzed: ${b.evolutionary_tier}]</div>
                                <div>Biochemistry: ${b.biochemistry} (${b.surface_temp_c}°C)</div>
                                <div>Kardashev Rating: Type ${b.kardashev_scale}</div>
                                <div style="margin-top:4px; color:#A0AEC0;">Profile: ${b.lifeform_profile}</div>
                            </div>
                        `;
                    }

                    const card = document.createElement("div");
                    card.className = `log-2 ${isIntervene ? 'intervene' : ''}`;
                    card.innerHTML = `
                        <div class="log-2-title">
                            <span>${icon}</span>
                            <span>${log.subject}</span>
                        </div>
                        <div class="log-2-meta mono">MODE: ${log.mode} | SYS: ${log.age_gyr.toFixed(3)} Gyr | LATENCY: ${log.latency_myr} MYR</div>
                        <div class="logic-step">
                            <div class="logic-icon">▶</div>
                            <div class="logic-text"><strong>Data Analysis:</strong> ${log.data_analysis}</div>
                        </div>
                        <div class="logic-step">
                            <div class="logic-icon">▶</div>
                            <div class="logic-text"><strong>Temporal Simulation:</strong> ${log.temporal_simulation}</div>
                        </div>
                        <div class="logic-decision logic-step">
                            <div class="logic-icon">■</div>
                            <div class="logic-text">"${log.resolution}"</div>
                        </div>
                        ${bioHtml}
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Failed to fetch logs:", err);
            }
        }

        // Initialize first fetch
        loadMoreLogs();
    </script>
</body>
</html>
