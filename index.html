<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Project Origin</title>
  
  <!-- Direct Link to Stylesheet -->
  <link rel="stylesheet" href="./ui/styles.css">
</head>
<body>

  <!-- 3D WebGPU Viewport -->
  <div id="canvas-container"></div>

  <!-- UI HUD Overlay -->
  <div class="ui-layer">
    <div class="top-hud">
      <div>
        <span class="badge-live"><span class="badge-dot"></span> LIVE</span>
        <div class="title-group">
          <h1>Project Origin</h1>
          <div class="universe-age" id="hud-age">0.00000 Myr</div>
        </div>
      </div>

      <div class="floating-tools interactive">
        <button class="tool-btn">🎯</button>
        <button class="tool-btn">👁️</button>
        <button class="tool-btn">⚙️</button>
      </div>
    </div>

    <!-- Inspector Card -->
    <div class="inspector-card interactive">
      <div class="object-info">
        <h3 id="obj-name">OBJECT 12,748</h3>
        <p id="obj-type">Type: Star | Mass: 1.07 M☉</p>
      </div>
      <button class="tool-btn" style="width:34px; height:34px;">›</button>
    </div>
  </div>

  <!-- Full Screen Modals -->
  <div id="view-events" class="view-screen">
    <h2 class="screen-title">EVENTS FEED</h2>
    <div id="events-container">
      <div class="event-card">
        <div class="event-title">💥 Big Bang Occurred</div>
        <div class="event-desc">Primordial inflation wave initiated with dark matter fluctuations.</div>
        <div class="event-time">t+0.00000 Myr</div>
      </div>
    </div>
  </div>

  <div id="view-ai" class="view-screen">
    <h2 class="screen-title">AI ARCHITECT</h2>
    <div class="event-card" style="border-color: var(--accent-purple);">
      <div class="event-title" style="color: var(--accent-purple);">CURRENT GOAL</div>
      <div class="event-desc" style="font-size: 14px; margin-top:6px;">Monitor primordial expansion & dark matter web formation.</div>
    </div>
  </div>

  <!-- Bottom Navigation Bar -->
  <nav class="navbar">
    <button class="nav-item active" id="btn-explore">
      <span class="nav-icon">🪐</span>
      <span>Explore</span>
    </button>
    <button class="nav-item" id="btn-events">
      <span class="nav-icon">⚡</span>
      <span>Events</span>
    </button>
    <button class="nav-item" id="btn-ai">
      <span class="nav-icon">🧠</span>
      <span>AI Architect</span>
    </button>
  </nav>

  <!-- Root Entry Point with Relative Path -->
  <script type="module" src="./index.js"></script>
</body>
</html>
